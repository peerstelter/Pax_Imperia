services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    # In production the client is served by Nginx; this service just builds the static files.
    # The 'nginx' service mounts the build output.

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      PORT: 3000
      DB_PATH: /data/pax_imperia.db
    volumes:
      - api-data:/data
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - client-dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api-data:
  client-dist:
